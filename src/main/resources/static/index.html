<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLiveChats | Seamless Communication</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="username-page">
        <div class="login-container">
            <div class="login-brand">
                <span class="logo-icon">J</span>
                <h1>JLiveChats</h1>
            </div>
            <div class="login-card">
                <h2>Welcome Back</h2>
                <p>Enter your username to join the discussion.</p>
                <form id="loginForm">
                    <div class="input-wrapper">
                        <input type="text" id="name" placeholder="Username" autocomplete="off" required />
                    </div>
                    <button type="submit" id="join-btn">Get Started</button>
                </form>
            </div>
        </div>
    </div>

        <!-- Chat Page -->
        <div id="chat-page" class="hidden">
            <div class="app-layout">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <div class="brand">
                            <span class="logo-icon small">J</span>
                            <span>JLiveChats</span>
                        </div>
                    </div>
                    <div class="sidebar-content">
                        <div class="section-label">CHANNELS</div>
                        <ul class="channel-list">
                            <li class="active"><span class="hash">#</span> general</li>
                            <li><span class="hash">#</span> engineering</li>
                            <li><span class="hash">#</span> off-topic</li>
                        </ul>
                        <div class="section-label mt-20">DIRECT MESSAGES</div>
                        <ul class="dm-list" id="userList">
                            <!-- User list can be dynamically added here -->
                        </ul>
                    </div>
                    <div class="user-profile">
                        <div class="avatar-sm" id="currentUserAvatar">?</div>
                        <div class="user-info">
                            <span class="username" id="currentUsername">User</span>
                            <span class="status">Online</span>
                        </div>
                        <button class="icon-btn" id="logout-btn">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 13v-2H7V8l-5 4 5 4v-3h9zM20 3h-9c-1.1 0-2 .9-2 2v4h2V5h9v14h-9v-4H9v4c0 1.1.9 2 2 2h9c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                        </button>
                    </div>
                </aside>
                <!-- Main Chat Area -->
                <main class="chat-area">
                    <header class="chat-header">
                        <div class="channel-info">
                            <span class="hash">#</span>
                            <h2>general</h2>
                            <span class="channel-desc">Welcome to the general channel.</span>
                        </div>
                        <button class="header-btn" title="View pinned messages" onclick="showPinnedMessages(document.querySelector('.channel-info h2').textContent)">
                            📌 <span id="pinCountBadge">0</span>
                        </button>
                    </header>

                    <div id="messageArea" class="messages-container">
                        <div class="welcome-banner">
                            <div class="banner-icon">#</div>
                            <h1>Welcome to #general!</h1>
                            <p>This is the start of the general channel. Say hello!</p>
                        </div>
                        <!-- Messages will appear here -->
                    </div>

                    <footer class="input-area">
                        <form id="messageForm">
                            <div class="message-input-wrapper">
                                <button type="button" class="tool-btn">
                                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                                </button>
                                <input type="text" id="message" placeholder="Message #general" autocomplete="off" />
                                <button type="submit" class="send-btn">
                                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                                </button>
                            </div>
                        </form>
                    </footer>
                </main>
            </div>
        </div>


    <script src="script.js"></script>
</body>
</html>
