<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JLiveChats</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="container">
        <div class="auth-box login-box">
            <div class="auth-header">
                <div class="logo">J</div>
                <h1>JLiveChats</h1>
                <p>Real-time Chat Application</p>
            </div>

            <div class="auth-form">
                <h2>Sign In</h2>
                <p class="subtitle">Welcome back! Please login to your account</p>

                <div th:if="${error}" class="error-message" th:text="${error}"></div>

                <form method="post" action="/login" class="form">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="Username" required class="form-input">
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" placeholder="Password" required class="form-input">
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>

                <div class="divider">OR</div>

                <a href="/oauth2/authorization/google" class="btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                    </svg>
                    Sign in with Google
                </a>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="/register" class="link">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
