<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | JLiveChats</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="container">
        <div class="auth-box register-box">
            <div class="auth-header">
                <div class="logo">J</div>
                <h1>JLiveChats</h1>
            </div>

            <div class="auth-form">
                <h2>Create Account</h2>
                <p class="subtitle">Join JLiveChats today and start chatting</p>

                <div th:if="${error}" class="error-message" th:text="${error}"></div>

                <form method="post" action="/register" class="form">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="Username" required class="form-input">
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="Email Address" required class="form-input">
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" placeholder="Password" required class="form-input">
                    </div>
                    <div class="form-group">
                        <input type="password" name="confirmPassword" placeholder="Confirm Password" required class="form-input">
                    </div>
                    <button type="submit" class="btn-primary">Create Account</button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="/login" class="link">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
